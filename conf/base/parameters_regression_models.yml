model_options_regression:
  test_size: 0.2
  random_state: 42
  features:
    - PC1
    - PC2
    - PC3
    - PC4
    - PC5
    - PC6
    - PC7
    - PC8
    - PC9
    - PC10
    - PC11
    - PC12
    - PC13
    - PC14
    - clustered_data
  target: Value_num
   
# OK    
_linear_param_grid:
  fit_intercept: [True, False]
  copy_X: [True, False]
  n_jobs: [None, -1]

# OK
_dt_param_grid:
  max_depth: [3, 5, None]     
  min_samples_split: [2, 5]      

# OK
_rf_param_grid:
  n_estimators: [100, 200, 300]  
  max_depth: [None, 10]         
  min_samples_split: [2, 5]      

# OK
_svr_param_grid:
  kernel: ["linear", "rbf"]
  C: [0.1, 1, 10]                
  gamma: ["scale"]              
